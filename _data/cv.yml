    Projects:
      - name: AI-Based Real-Time Fire & Accident Detection System
        summary: "A real-time surveillance system using YOLOv8 to detect fire incidents, road accidents, and vehicle number plates from CCTV footage. Funded by the University Grants Commission (UGC). Contributed to data preprocessing (histogram equalization and optical flow), model training, system integration, and a dual-alert notification system using Telegram and Twilio."
        highlights:
          - YOLOv8 Real-Time Detection
          - UGC Funded Research
          - Dual-Alert System (Telegram & Twilio)
        start_date: ""
        end_date: ""

      - name: IoT-Based Smart Waste Management System
        summary: "An Internet of Things (IoT)-based smart trash can monitoring system that detects current trash receptivity to develop a smart garbage cleanup solution for a cleaner environment."
        highlights:
          - IoT Sensor Integration
          - Smart City Application
        start_date: ""
        end_date: ""

      - name: Design and Implementation of the Dual-Axis Solar Tracking System
        summary: "A dual-axis solar PLC-based automatic tracking system with supervisory and control capabilities designed to maximize energy generation by following sunlight intensity on a photovoltaic panel."
        highlights:
          - PLC-Based Automation
          - Renewable Energy
        start_date: ""
        end_date: ""

      - name: Design of Smart Home Security System using Object Recognition and PIR Sensor
        summary: "A home security system with human detection capability using a PIR sensor on Arduino and a webcam on Raspberry Pi 3. Detects movement and captures images for human recognition and alerts."
        highlights:
          - Raspberry Pi & Arduino
          - PIR Sensor & Object Recognition
        start_date: ""
        end_date: ""

      - name: "ICE Connect App: A Unified Information Portal for PUST ICE Department"
        summary: "An Android app for the Department of ICE at PUST providing detailed profiles of all ICE students and faculty members, enabling easy access to academic information and improving communication within the department."
        highlights:
          - Android App Development
          - Academic Information Portal
        start_date: ""
        end_date: ""

